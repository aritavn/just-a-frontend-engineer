<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="theme-color"
      content="#0f0f0f"
    />
    <meta
      name="author"
      content="Rita Nunes"
    />
    <meta
      name="robots"
      content="index, follow"
    />
    <link
      rel="preconnect"
      href="https://www.googletagmanager.com"
    />
    <script>
      (function () {
        try {
          const mode = localStorage.getItem('site-mode');
          if (mode === 'light') {
            document.documentElement.dataset.theme = 'light';
            document.documentElement.dataset.accent =
              localStorage.getItem('site-accent-light') || 'coral';
          } else if (mode === 'dark') {
            document.documentElement.dataset.theme =
              localStorage.getItem('site-accent-dark') || 'green';
            document.documentElement.dataset.accent =
              localStorage.getItem('site-accent-dark') || 'green';
          }
        } catch (error) {
          // ignore if storage is unavailable
        }
      })();
    </script>
    <title>Just a Frontend Engineer</title>
  </head>

  <body>
    <div id="root"></div>
    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
